input {
  file {
    path => "/usr/share/logstash/dataset.txt"
    start_position => "beginning"
    sincedb_path => "/dev/null" 
  }
}

filter {
  grok {
    match => { "message" => "%{COMMONAPACHELOG}" }
  }
  
  mutate {
    convert => {
      "response" => "integer"
      "bytes" => "integer"
    }
  }
}

output {
  opensearch {
    hosts       => ["http://opensearch:9200"]
    index       => "web-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}